<!DOCTYPE html>
<html>

<head>
    <title>Array Operations</title>
</head>

<body>

    <h2>Array Operations</h2>

    <!-- Textfield to accept value -->
    Enter Value:
    <input type="text" id="value">

    <br><br>

    <!-- Button to check value -->
    <button onclick="checkValue()">Check Value</button>

    <!-- Button to add at end -->
    <button onclick="addToEnd()">Add To End</button>

    <br><br>

    <!-- Textfield for index -->
    Enter Index:
    <input type="number" id="index">

    <br><br>

    <!-- Insert button -->
    <button onclick="insertAtIndex()">Insert At Index</button>

    <br><br>

    <!-- Remove button -->
    <button onclick="removeAtIndex()">Remove</button>

    <br><br>

    <p id="result"></p>

    <p id="finalArray"></p>

    <script src="array.js"></script>

</body>

</html>
